# Runs the manager. The per-server Factorio containers are created dynamically by
# the manager itself over the mounted Docker socket (they are NOT declared here).
#
# The manager and every Factorio container it creates join the `factorio-net`
# bridge network, so the manager reaches each server's RCON over that network
# (RCON is never published to the internet).

services:
  manager:
    build: .
    image: factorio-manager:latest
    container_name: factorio-manager
    restart: unless-stopped
    # Give the manager time to gracefully stop the Factorio containers on shutdown
    # (only matters when STOP_SERVERS_ON_SHUTDOWN=true).
    stop_grace_period: 90s
    ports:
      # Web UI + API on the host. Change the host side via WEB_PORT (the container
      # always listens on 8080). Put a TLS reverse proxy in front in production.
      - "${WEB_PORT:-8080}:8080"
    environment:
      # --- Auth (required) ---
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:-}

      # --- Data ---
      # Data lives at this path on BOTH the host and inside the container (identity
      # bind mount, below). Because the path is identical on both sides, the
      # backend's default HOST_SERVERS_DIR = DATA_DIR/servers is already correct for
      # the host Docker daemon — so there is nothing else to configure. Override
      # FTM_DATA_DIR to relocate (e.g. FTM_DATA_DIR=$HOME/.factorio-tools-manager).
      DATA_DIR: ${FTM_DATA_DIR:-/opt/factorio-tools-manager}

      # --- Port pools (must match what you forwarded on the router) ---
      GAME_PORT_RANGE: ${GAME_PORT_RANGE:-34197-34297}
      RCON_PORT_RANGE: ${RCON_PORT_RANGE:-27015-27115}

      # --- Docker / Factorio image ---
      FACTORIO_IMAGE: ${FACTORIO_IMAGE:-factoriotools/factorio:stable}
      FACTORIO_NETWORK: factorio-net
      RCON_MODE: network
      PUID: ${PUID:-845}
      PGID: ${PGID:-845}
      # Stop all Factorio containers when the manager shuts down (e.g. compose down).
      # Default false => games keep running across a manager restart/update.
      STOP_SERVERS_ON_SHUTDOWN: ${STOP_SERVERS_ON_SHUTDOWN:-false}
      # DNS / DDNS (Cloudflare) is configured in the dashboard, not via env.
    volumes:
      # Manage sibling containers via the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data (SQLite DB + per-server save/mod/config dirs), bind-mounted
      # at the SAME absolute path host-side and container-side. This identity makes
      # DATA_DIR/servers a valid host path for the Factorio containers' bind mounts,
      # so HOST_SERVERS_DIR needs no separate configuration.
      - ${FTM_DATA_DIR:-/opt/factorio-tools-manager}:${FTM_DATA_DIR:-/opt/factorio-tools-manager}
    networks:
      - factorio-net

networks:
  factorio-net:
    name: factorio-net
    driver: bridge
