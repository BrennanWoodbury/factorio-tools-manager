name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 26 is required: the app uses the built-in node:sqlite module.
          node-version: '26'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run typecheck
        working-directory: backend
      - run: npm test
        working-directory: backend

  frontend:
    name: Frontend — typecheck, tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  template:
    name: Unraid template — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
      # Community Applications reads templates/*.xml and ca_profile.xml straight
      # from main's raw URLs. There is no publish step between a merge and what
      # users see, so a malformed template must fail here or not at all.
      - run: node scripts/validate-template.mjs

  image:
    name: Build & push edge image
    needs: [backend, frontend, template]
    # Pushes to main publish `edge` only. `latest` moves solely on a release tag
    # (release.yml), so merging can no longer reach the users tracking `latest`
    # through the Unraid template.
    # Gated on the Docker Hub target being configured (repository variable
    # DOCKERHUB_IMAGE, e.g. "youruser/factorio-tools-manager") so a fork stays green.
    if: github.event_name == 'push' && vars.DOCKERHUB_IMAGE != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=edge
            type=sha,format=short,prefix=main-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=edge-${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
